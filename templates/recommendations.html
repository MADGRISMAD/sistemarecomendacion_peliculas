<!DOCTYPE html>
<html>
  <head>
    <title>Recomendaciones de Películas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <!-- Agrega aquí cualquier otro CSS o JS necesario para el carrusel -->
  </head>
  <body class="bg-gray-900 text-white font-sans">
    <style>
      .hero {
        background: linear-gradient(
            to right,
            rgba(0, 0, 0, 0.7) 0%,
            rgba(0, 0, 0, 0.3) 100%
          ),
          url("{{ backdrop_url }}") no-repeat center center;
        background-size: cover;
        height: 500px;
        display: flex;
        align-items: center;
        position: relative;
      }

      /* Estilos adicionales para el carrusel */
      .carrusel {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-gap: 20px;
      }

      .movie-card {
        text-align: center;
      }
      
      .movie-card img {
        max-width: 100%;
        height: auto;
      }
    </style>
    <header class="bg-gradient-to-none from-red-900 to-transparent p-4">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-semibold">Recomendaciones de Películas</h1>
        <nav>
          <ul class="flex">
            <li class="mr-6">
              <a href="#" class="text-white hover:text-gray-400">Inicio</a>
            </li>
            <li class="mr-6">
              <a href="#" class="text-white hover:text-gray-400">Películas</a>
            </li>
            <li>
              <a href="#" class="text-white hover:text-gray-400">Contacto</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="container mx-auto my-8">
      <h2 class="text-2xl font-semibold text-center">
        Recomendaciones Basadas en tus Elecciones
      </h2>

      <!-- Carruseles por género -->
      {% for genre, movies in genre_recommendations.items() %}
      <div class="my-8">
        <h3 class="text-xl font-semibold">{{ genre }}</h3>
        <div class="carrusel">
          {% for movie in movies %}
          <div class="movie-card">
            <img
              src="https://image.tmdb.org/t/p/w400{{ movie['poster_path'] }}"
              alt="{{ movie['title'] }} Movie Poster"
            />
            <p class="text-sm mt-2">{{ movie['title'] }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endfor %}
    </main>
  </body>
</html>
